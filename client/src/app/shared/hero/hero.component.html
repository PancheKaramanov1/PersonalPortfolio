<section class="hero" aria-labelledby="hero-title">
  <div class="hero__glow" aria-hidden="true"></div>
  <p class="hero__eyebrow">Developer · Builder · Film & music nerd</p>
  <h1 id="hero-title" class="hero__title">{{ name }}</h1>
  <p class="hero__role">{{ role }}</p>
  <p class="hero__intro">{{ intro }}</p>
  <div class="hero__actions">
    <a [routerLink]="primaryLink" class="btn btn--primary">{{ primaryLabel }}</a>
    <a [routerLink]="secondaryLink" class="btn btn--ghost">{{ secondaryLabel }}</a>
  </div>
</section>
